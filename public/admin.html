<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель ведущего</title>
  <style>
    body { font-family: sans-serif; background: #1e1e2f; color: white; padding: 20px; }
    button { padding: 12px 24px; margin: 5px; font-size: 1em; border: none; border-radius: 8px; cursor: pointer; }
    .control-panel { background: #2d2d44; padding: 20px; border-radius: 12px; }
    .pause-btn { background: #f0ad4e; }
    .resume-btn { background: #5cb85c; }
    .pause-btn.active { background: #d9534f; }
    select, input { padding: 10px; font-size: 1em; }
  </style>
</head>
<body>
  <h1>Управление викториной</h1>
  <div class="control-panel">
    <label>Режим команд:</label>
    <select id="modeSelect">
      <option value="1">1 команда (соло)</option>
      <option value="2" selected>2 команды (дуэль)</option>
      <option value="4">4 команды</option>
    </select>
    <label>Тема:</label>
    <select id="themeSelect">
      <option value="space">Космос</option>
      <option value="nature">Природа</option>
      <option value="future">Футуризм</option>
    </select>
    <button id="startBtn">Начать игру</button>
    <button id="pauseBtn" class="pause-btn">⏸ Пауза</button>
    <button id="themeApplyBtn">Применить тему</button>
    <p>Статус: <span id="status">ожидание</span></p>
    <p>Оставшееся время вопроса: <span id="timeDisplay">-</span></p>
  </div>
  <script src="js/admin.js"></script>
</body>
</html>
